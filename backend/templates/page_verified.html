<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Verified</title>
  <link href="https://fonts.cdnfonts.com/css/gilroy-free" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Gilroy', sans-serif;
      background: #DFF2E9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      border-radius: 4px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      max-width: 420px;
      width: 100%;
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 24px;
        border-radius: 0;
        box-shadow: none;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      h1 {
        font-size: 20px;
      }

      p {
        font-size: 14px;
      }
    }

    h1 {
      color: #06C167;
      font-size: 24px;
      margin-bottom: 12px;
    }

    p {
      color: #000;
      font-size: 16px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>You're verified!</h1>
    <p>Welcome to the system. Your email has been successfully verified.</p>
  </div>
</body>

</html>

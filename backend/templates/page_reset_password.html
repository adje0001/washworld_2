<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://fonts.cdnfonts.com/css/gilroy-free" rel="stylesheet">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Gilroy', sans-serif;
        background: #DFF2E9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: white;
        border-radius: 2px;
        padding: 48px 40px;
        text-align: center;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        max-width: 420px;
        width: 100%;
    }

    h1 {
        color: #000;
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 8px;
    }

    p {
        color: #000;
        font-size: 14px;
        margin-bottom: 28px;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #ddd;
        border-radius: 2px;
        font-family: 'Gilroy', sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
    }

    input:focus {
        border-color: #06C167;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #06C167;
        color: white;
        border: none;
        border-radius: 2px;
        font-family: 'Gilroy', sans-serif;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 8px;
        transition: background 0.2s;
    }

    button:hover {
        background: #05a657;
    }

    @media (max-width: 480px) {
        .card {
            padding: 32px 24px;
            border-radius: 0;
            box-shadow: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 20px;
        }
    }
    </style>
</head>

<body>
    <div class="card">
        <h1>Reset Password</h1>
        <p>Enter your new password below.</p>
        <form action="/reset-password" method="POST">
            <input name="password" type="password" placeholder="New password">
            <input name="confirm_password" type="password" placeholder="Confirm new password">
            <input name="key" type="hidden" value="{{key}}">
            <button>Save password</button>
        </form>
    </div>
</body>

</html>
